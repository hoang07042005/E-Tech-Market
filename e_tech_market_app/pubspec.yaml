name: e_tech_market_app
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_sign_in: ^6.0.2
  shared_preferences: ^2.0.17
  image_picker: ^1.2.0
  flutter_html: ^3.0.0-beta.2
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.0
  youtube_player_flutter: ^9.1.3
  intl: ^0.19.0
  fl_chart: 0.69.2
  dio: ^5.9.2
  flutter_secure_storage: ^10.3.1
  provider: ^6.1.5+1
  float_column: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logoEtech.png"
  min_sdk_size: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/logoEtech.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/logo_shadow.png
