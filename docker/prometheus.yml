# Prometheus configuration
# docker/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'etech-market'
    environment: '${ENVIRONMENT:-staging}'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Laravel Backend API Metrics
  - job_name: 'laravel'
    metrics_path: '/api/v1/metrics/prometheus'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['nginx:8000']
        labels:
          service: 'api'
          region: 'primary'
    basic_auth:
      username: 'prometheus'
      password: 'prometheus_secure_password_123'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # PostgreSQL (via postgres_exporter if available)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Redis (via redis_exporter if available)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Docker daemon (if available) - disabled on Windows
  # Unix socket not available on Windows, use host.docker.internal:9323 if cadvisor is running
  # - job_name: 'docker'
  #   static_configs:
  #     - targets: ['localhost:9323']
