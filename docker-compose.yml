services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./e-tech-market-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  backend:
    build:
      context: ./e-tech-market-backend
      dockerfile: Dockerfile
    expose:
      - "9000"
    volumes:
      - ./e-tech-market-backend:/var/www
      - backend_vendor:/var/www/vendor
    command: sh -c "php artisan storage:link && php artisan config:clear && php artisan cache:clear && php artisan route:clear && php artisan view:clear && php-fpm"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=etech
      - DB_USERNAME=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - QUEUE_CONNECTION=database
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Redis password is set via environment variable. If not set, it defaults to empty.
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SCOUT_DRIVER=meilisearch
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILISEARCH_KEY:-etech-master-key-1234}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD-SHELL", "php artisan env || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./e-tech-market-backend:/var/www
      - ./e-tech-market-backend/docker-nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  queue_worker:
    build:
      context: ./e-tech-market-backend
      dockerfile: Dockerfile
    volumes:
      - ./e-tech-market-backend:/var/www
      - backend_vendor:/var/www/vendor
    command: /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=etech
      - DB_USERNAME=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - QUEUE_CONNECTION=database
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Redis password is set via environment variable. If not set, it defaults to empty.
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
    depends_on:
      - backend
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=etech
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY:-etech-master-key-1234}
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

volumes:
  meili_data:
  db_data:
  backend_vendor:
