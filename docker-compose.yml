services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./e-tech-market-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  backend:
    build:
      context: ./e-tech-market-backend
      dockerfile: Dockerfile
    expose:
      - "9000"
    volumes:
      - ./e-tech-market-backend:/var/www
      - /var/www/vendor
      
    command: /bin/sh -c "([ -L public/storage ] || php artisan storage:link --force) && cp /usr/local/etc/php-fpm.d/www.conf /usr/local/etc/php-fpm.d/www.conf.bak && sed -i 's|listen = 127.0.0.1:9000|listen = 0.0.0.0:9000|' /usr/local/etc/php-fpm.d/www.conf && php-fpm"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=etech
      - DB_USERNAME=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - QUEUE_CONNECTION=database
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Redis password is set via environment variable.
      - REDIS_PASSWORD=${REDIS_PASSWORD:-etech-redis-secret-123}
      - SCOUT_DRIVER=meilisearch
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILISEARCH_KEY:-etech-master-key-1234}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
    depends_on:
      - db
      - redis
#    healthcheck:
#      test: ["CMD-SHELL", "php artisan env || exit 1"]
#      interval: 30s
#      timeout: 10s
#      retries: 5
#      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./e-tech-market-backend:/var/www
      - ./e-tech-market-backend/docker-nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  queue_worker:
    build:
      context: ./e-tech-market-backend
      dockerfile: Dockerfile
    volumes:
      - ./e-tech-market-backend:/var/www
      - /var/www/vendor
      
    command: /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=etech
      - DB_USERNAME=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - QUEUE_CONNECTION=database
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Redis password is set via environment variable.
      - REDIS_PASSWORD=${REDIS_PASSWORD:-etech-redis-secret-123}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
    depends_on:
      - backend
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=etech
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-etech-redis-secret-123}
    ports:
      - "127.0.0.1:6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY:-etech-master-key-1234}
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - meili_data:/meili_data

volumes:
  meili_data:
  db_data:


