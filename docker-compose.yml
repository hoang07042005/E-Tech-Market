version: '3.8'

services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./e-tech-market-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  backend:
    build:
      context: ./e-tech-market-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./e-tech-market-backend/storage:/var/www/storage
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=etech
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - QUEUE_CONNECTION=database
    depends_on:
      - db
      - redis

  queue_worker:
    build:
      context: ./e-tech-market-backend
      dockerfile: Dockerfile
    command: php artisan queue:work --tries=3
    volumes:
      - ./e-tech-market-backend/storage:/var/www/storage
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=etech
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - QUEUE_CONNECTION=database
    depends_on:
      - backend
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=etech
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  db_data:
