services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./e-tech-market-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  backend:
    build:
      context: ./e-tech-market-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./e-tech-market-backend:/var/www
      - backend_vendor:/var/www/vendor
    command: sh -c "php artisan storage:link && php artisan config:clear && php artisan cache:clear && php artisan route:clear && php artisan view:clear && php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=etech
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - QUEUE_CONNECTION=database
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=null
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
    depends_on:
      - db
      - redis

  queue_worker:
    build:
      context: ./e-tech-market-backend
      dockerfile: Dockerfile
    volumes:
      - ./e-tech-market-backend:/var/www
      - backend_vendor:/var/www/vendor
    command: sh -c "php artisan storage:link && php artisan config:clear && php artisan cache:clear && php artisan route:clear && php artisan view:clear && php artisan queue:work --tries=3"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=etech
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - QUEUE_CONNECTION=database
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=null
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
    depends_on:
      - backend
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=etech
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  db_data:
  backend_vendor:
